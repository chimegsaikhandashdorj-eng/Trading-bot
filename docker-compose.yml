services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: trading-bot:latest
    container_name: trading-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HEALTH_HOST: "0.0.0.0"
      HEALTH_PORT: "8000"
      # Disable file logging inside container — stdout goes to docker logs
      DISABLE_FILE_LOG: "0"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
